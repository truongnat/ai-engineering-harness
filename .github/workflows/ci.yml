name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint code (ESLint)
        run: npx eslint bin/ test/ *.js --max-warnings 0 --no-error-on-unmatched-pattern

      - name: Check formatting (Prettier)
        run: npx prettier --check src/ bin/ test/ *.js *.md --no-error-on-unmatched-pattern

      - name: Typecheck (strict)
        run: npm run typecheck

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Validate pack contracts
        run: npm run build && node bin/validate.js

      - name: Run repository tests
        run: npm test

      - name: Run eval regression
        run: node dist/cli/main.js eval run sample-bugfix --yes --no-llm-judge

      - name: Check coverage gate
        run: npm run test:coverage

      - name: Smoke test install (dry-run)
        run: node scripts/smoke-install.js

      - name: Run dogfood demo tests
        working-directory: examples/dogfood-tiny-node-api
        run: npm test
